      #     # Drives: defects4j patch/states/generate_specification,
      #     # transform.jar, update_oracle_helper, and the verify_*.sh scripts.
      #     "$GITHUB_WORKSPACE/state_utils/full_state_analysis.sh"
      #
      #     # Validate that at least one bug-revealing test was produced.
      #     if [ ! -f test_outcome.json ]; then
      #       echo "❌ test_outcome.json was not generated"
      #       exit 1
      #     fi
      #     if jq -e '.[] | select(.outcome == "accept")' test_outcome.json >/dev/null 2>&1; then
