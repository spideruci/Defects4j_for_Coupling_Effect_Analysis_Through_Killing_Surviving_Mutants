name: CI (Java11 + Maven + Defects4J)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git perl cpanminus build-essential jq unzip wget curl

      # Defects4J pulls some project repositories over Subversion (>= 1.8).
      - name: Install Subversion (svn)
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion
          svn --version

      - name: Verify svn version >= 1.8
        run: |
          VERSION=$(svn --version --quiet)
          echo "Detected svn version: $VERSION"
          REQUIRED=1.8
          if [ "$(printf '%s\n' "$REQUIRED" "$VERSION" | sort -V | head -n1)" != "$REQUIRED" ]; then
            echo "svn version must be >= $REQUIRED"
            exit 1
          fi

      - name: Install Perl and CPAN dependencies (Defects4J framework)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y perl cpanminus build-essential

          # Core modules required by the Defects4J framework.
          sudo cpanm --notest \
            DBI \
            DBD::CSV \
            JSON \
            JSON::PP \
            JSON::Parse \
            XML::Parser \
            XML::Parser::PerlSAX \
            List::Util \
            File::Basename \
            File::Path \
            File::Copy \
            Getopt::Long \
            Time::HiRes \
            String::Interpolate \
            URI \
            Proc::ProcessTable

          perl -v

      - name: Install Perl dependencies from cpanfile
        run: |
          cpanm --notest --installdeps .

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The analysis scripts in this repo (analyzeOracle.py and friends) rely
      # only on the Python standard library, so no extra pip packages are needed.
      - name: Verify Python
        run: python --version

      # Run init.sh (downloads project repos, Major, test-generation tools, etc.)
      - name: Run init.sh
        run: |
          chmod +x ./init.sh
          ./init.sh

      - name: Add Defects4J to PATH
        run: echo "$GITHUB_WORKSPACE/framework/bin" >> $GITHUB_PATH

      - name: Verify Defects4J installation
        run: which defects4j

      # ----------------------------------------------------------------------
      # Smoke test: exercise core Defects4J AND the custom commands this
      # artifact adds (e.g. `defects4j patch -b|-f`) on the canonical Cli-2
      # example, without paying for the full ~13 min mutation pipeline.
      # ----------------------------------------------------------------------
      - name: Defects4J + custom-command smoke test (Cli-2)
        shell: bash
        run: |
          set -euo pipefail
          WORKDIR="$RUNNER_TEMP/cli_2"
          defects4j checkout -p Cli -v 2b -w "$WORKDIR"
          cd "$WORKDIR"

          echo "::group::Compile buggy version"
          defects4j compile
          echo "::endgroup::"

          echo "::group::Run test suite"
          defects4j test
          echo "::endgroup::"

          # Exercise the custom `patch` command added by this artifact:
          # switch buggy -> fixed -> buggy and confirm each variant compiles.
          echo "::group::Switch to fixed variant (defects4j patch -f)"
          defects4j patch -f
          defects4j compile
          echo "::endgroup::"

          echo "::group::Switch back to buggy variant (defects4j patch -b)"
          defects4j patch -b
          defects4j compile
          echo "::endgroup::"

      # ----------------------------------------------------------------------
      # Assertion-generation flow on the canonical Cli-2 example.
      # Runs the full pipeline (state_utils/full_state_analysis.sh):
      #   - real-bug side:  defects4j states -> generate_specification ->
      #                     transform.jar -> update_oracle_helper -b -> verify
      #                     => test_outcome.json
      #   - mutant side:    mutation_analysis -> surviving mutants ->
      #                     states_on_mutants -> generate_specification -m ->
      #                     transform.jar -m -> update_oracle_helper -m -> verify
      #                     => test_outcome_mutants.json, detect_real_bugs.json
      # Then validates the generated assertion outputs.
      # This is the heavy stage (~13+ min locally, longer in CI).
      # ----------------------------------------------------------------------
      - name: Assertion generation (Cli-2) + output validation
        shell: bash
        timeout-minutes: 90
        run: |
          set -uo pipefail
          cd "$RUNNER_TEMP"

          # `get_project` is the documented entry point: it checks out Cli_2b,
          # stages `passing_covering_tests` (from coverages/Cli_2b) — a
          # prerequisite of `defects4j states` — and copies every helper script
          # plus full_state_analysis.sh into the Cli_2b working directory.
          defects4j get_project Cli 2b
          cd Cli_2b

          echo "::group::Run full assertion-generation pipeline (real bug + mutants)"
          bash full_state_analysis.sh
          echo "::endgroup::"

          echo "::group::Validate generated assertion outputs"
          fail=0
          check_outcome () {
            local file="$1" label="$2" desc="$3"
            if [[ ! -f "$file" ]]; then
              echo "❌ $desc: $file was not produced"; fail=1; return
            fi
            local n
            n=$(jq --arg o "$label" '[.[] | select(.outcome == $o)] | length' "$file" 2>/dev/null || echo 0)
            echo "• $desc → $n entr(y/ies) with outcome=\"$label\""
            if [[ "${n:-0}" -lt 1 ]]; then
              echo "❌ $desc: expected at least one \"$label\" outcome in $file"; fail=1
            else
              echo "✅ $desc"
            fi
          }

          check_outcome test_outcome.json         accept  "Real-bug-derived assertions (bug-revealing)"
          check_outcome test_outcome_mutants.json accept  "Mutant-derived assertions (validated)"
          check_outcome detect_real_bugs.json     killing "Mutant-derived assertions detecting the real bug"
          echo "::endgroup::"

          exit $fail

      # ----------------------------------------------------------------------
      # Lang-6b — a real second bug that exercises the FULL pipeline (the real-bug
      # side AND the mutant side / mutation analysis). Lang-6b generates real-bug-
      # revealing assertions, but killing its surviving mutants yields no real-bug-
      # detecting assertion (0 `killing`), so full_state_analysis.sh exits non-zero.
      # That is an EXPECTED outcome (killing mutants does not always detect the real
      # bug — a limit of the coupling effect), not a failure. This stage therefore
      # passes when the pipeline RAN and only reports the counts; it does NOT gate on
      # the mutant-kill count (nondeterministic across environments). The strict
      # positive validation (12/9/9) stays on Cli-2 above.
      # ----------------------------------------------------------------------
      - name: Assertion generation (Lang-6b) — second bug, full pipeline
        shell: bash
        timeout-minutes: 90
        run: |
          set -uo pipefail
          cd "$RUNNER_TEMP"
          defects4j get_project Lang 6b
          cd Lang_6b

          echo "::group::Run full assertion-generation pipeline for Lang-6b"
          # A bug with 0 mutant killings exits non-zero — expected, not a failure.
          bash full_state_analysis.sh || true
          echo "::endgroup::"

          echo "::group::Report Lang-6b outcome"
          if [[ ! -f test_outcome.json ]]; then
            echo "❌ pipeline did not run (no test_outcome.json produced)"; exit 1
          fi
          acc=$(jq '[.[] | select(.outcome=="accept")] | length' test_outcome.json 2>/dev/null || echo 0)
          if [[ -f detect_real_bugs.json ]]; then
            kil=$(jq '[.[] | select(.outcome=="killing")] | length' detect_real_bugs.json 2>/dev/null || echo 0)
          else
            kil="0 (mutant side not reached)"
          fi
          echo "• Lang-6b real-bug-derived accepts : $acc"
          echo "• Lang-6b mutant-derived killings  : $kil"
          echo "✅ Lang-6b pipeline ran end-to-end. Mutant-derived detection may be 0 — killing"
          echo "   surviving mutants does not always detect the real bug (and varies by environment)."
          echo "::endgroup::"
