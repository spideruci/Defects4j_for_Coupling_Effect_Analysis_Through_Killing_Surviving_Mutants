name: Docker image

on:
  push:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute (lowercase) image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE:ci" .

      # Lightweight smoke test: confirm the image is wired up correctly.
      - name: Smoke test (Defects4J on PATH + custom commands)
        run: |
          docker run --rm "$IMAGE:ci" which defects4j
          docker run --rm "$IMAGE:ci" defects4j info -p Cli | head -n 20

      # "More usage" check: run the DOCUMENTED command for a real second bug,
      #   docker run IMG run-example.sh Lang 6b
      # end-to-end on the built image. This both (a) guards the reviewer-reported
      # `exec: Lang: not found` — the args must reach run-example.sh — and (b) exercises
      # the FULL pipeline (real-bug side AND mutant side). Lang-6b generates real-bug
      # assertions but 0 mutant-derived detections, so run-example.sh exits non-zero — an
      # EXPECTED outcome (killing mutants doesn't always detect the real bug), not a CI
      # failure. We pass when the pipeline RAN (its validation summary is printed) and do
      # not gate on the kill count (mutation analysis is nondeterministic across
      # environments). The positive 12/9/9 validation lives in ci.yml's Cli-2 stage.
      - name: More-usage check (run-example.sh Lang 6b — second bug, full pipeline)
        run: |
          set +e
          out="$(docker run --rm "$IMAGE:ci" run-example.sh Lang 6b 2>&1)"
          rc=$?
          { grep -E "Preparing Lang-6b|Running assertion-generation|Real-bug-derived|Mutant-derived|entr\(y/ies\)|killing test found|No bug detecting|get_project Lang 6b failed" <<< "$out" || true; } | tail -n 20
          echo "---- run-example.sh exit code: $rc (non-zero is expected when 0 killings) ----"
          if grep -q "get_project Lang 6b failed" <<< "$out"; then
            echo "❌ get_project Lang 6b failed (missing coverage?)"; exit 1
          fi
          if ! grep -q "Preparing Lang-6b" <<< "$out"; then
            echo "❌ 'Lang 6b' did not reach run-example.sh (regression: exec issue)"; exit 1
          fi
          if ! grep -q "Validating generated assertion outputs" <<< "$out"; then
            echo "❌ pipeline did not run to the validation stage for Lang 6b"; exit 1
          fi
          echo "✅ 'docker run IMG run-example.sh Lang 6b' ran the full pipeline end-to-end."
          echo "   Mutant-derived detection may be 0 — killing mutants does not always detect the real bug."
          exit 0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          docker tag "$IMAGE:ci" "$IMAGE:latest"
          docker tag "$IMAGE:ci" "$IMAGE:${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::12}"
          echo "Pushed $IMAGE:latest and $IMAGE:${GITHUB_SHA::12}"
