name: Docker image

on:
  push:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute (lowercase) image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE:ci" .

      # Lightweight smoke test: confirm the image is wired up correctly.
      - name: Smoke test (Defects4J on PATH + custom commands)
        run: |
          docker run --rm "$IMAGE:ci" which defects4j
          docker run --rm "$IMAGE:ci" defects4j info -p Cli | head -n 20

      # "More usage" regression guard for the reviewer-reported `exec: Lang: not found`.
      # The documented `docker run IMG run-example.sh <Project> <Version>` form must pass its
      # arguments TO run-example.sh (not exec them as a command). We probe with a bogus bug so
      # this is fast and deterministic: run-example.sh must RECEIVE the args and fail cleanly at
      # get_project — NOT the entrypoint trying to exec a program named after the argument.
      # We intentionally do NOT assert per-bug mutant-kill counts here: mutation analysis is
      # nondeterministic across environments (e.g., a "detectable" bug can yield 0 killings on a
      # CI runner), so full result validation lives in the deterministic Cli-2 stage of ci.yml.
      - name: More-usage check (parameterized command reaches run-example.sh)
        run: |
          set +e
          out="$(docker run --rm "$IMAGE:ci" run-example.sh __PROBE__ 0z 2>&1)"
          echo "$out" | tail -n 8
          if echo "$out" | grep -q "exec: __PROBE__: not found"; then
            echo "❌ arguments were exec'd as a command — the reviewer's bug is present"; exit 1
          fi
          if echo "$out" | grep -q "get_project __PROBE__ 0z failed"; then
            echo "✅ arguments correctly passed to run-example.sh (documented form works)"; exit 0
          fi
          echo "❌ unexpected output from run-example.sh"; exit 1

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          docker tag "$IMAGE:ci" "$IMAGE:latest"
          docker tag "$IMAGE:ci" "$IMAGE:${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::12}"
          echo "Pushed $IMAGE:latest and $IMAGE:${GITHUB_SHA::12}"
