name: Docker image

on:
  push:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "init.sh"
      - "cpanfile"
      - "project_repos/get_repos.sh"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute (lowercase) image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE:ci" .

      # Lightweight smoke test: confirm the image is wired up correctly.
      - name: Smoke test (Defects4J on PATH + custom commands)
        run: |
          docker run --rm "$IMAGE:ci" which defects4j
          docker run --rm "$IMAGE:ci" defects4j info -p Cli | head -n 20

      # "More usage" check: run the DOCUMENTED command for a real second bug,
      #   docker run IMG run-example.sh Lang 11b
      # end-to-end on the built image. This both (a) guards the reviewer-reported
      # `exec: Lang: not found` — the args must reach run-example.sh — and (b) exercises
      # the coupling LIMIT: for Lang-11b, killing surviving mutants yields no real-bug-
      # detecting assertion, so run-example.sh exits non-zero (0 `killing`). That is the
      # EXPECTED scientific outcome, not a CI failure — so we pass when the pipeline RAN
      # (its validation summary is printed) and do not gate on the kill count (mutation
      # analysis is nondeterministic across environments). The positive 12/9/9 validation
      # lives in the deterministic Cli-2 stage of ci.yml.
      - name: More-usage check (run-example.sh Lang 11b — coupling-limit demo)
        run: |
          set +e
          out="$(docker run --rm "$IMAGE:ci" run-example.sh Lang 11b 2>&1)"
          rc=$?
          echo "$out" | grep -E "Preparing Lang-11b|Running assertion-generation|Real-bug-derived|Mutant-derived|entr\(y/ies\)|killing test found|No bug detecting|get_project Lang 11b failed" | tail -n 20
          echo "---- run-example.sh exit code: $rc (non-zero is expected for a non-coupled bug) ----"
          if echo "$out" | grep -q "get_project Lang 11b failed"; then
            echo "❌ get_project Lang 11b failed (missing coverage?)"; exit 1
          fi
          if ! echo "$out" | grep -q "Preparing Lang-11b"; then
            echo "❌ 'Lang 11b' did not reach run-example.sh (regression: exec issue)"; exit 1
          fi
          if ! echo "$out" | grep -q "Validating generated assertion outputs"; then
            echo "❌ pipeline did not run to the validation stage for Lang 11b"; exit 1
          fi
          echo "✅ 'docker run IMG run-example.sh Lang 11b' ran the full pipeline end-to-end."
          echo "   0 real-bug-detecting mutant assertions is the expected coupling-limit result for Lang-11b."
          exit 0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          docker tag "$IMAGE:ci" "$IMAGE:latest"
          docker tag "$IMAGE:ci" "$IMAGE:${GITHUB_SHA::12}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::12}"
          echo "Pushed $IMAGE:latest and $IMAGE:${GITHUB_SHA::12}"
